<svg width="100%" height="90" viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulseLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0B3D91"/>
      <stop offset="100%" stop-color="#00D1FF"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00D1FF"/>
    </radialGradient>
  </defs>

  <!-- neural path -->
  <path id="neuralPath" d="M40,50 L190,28 L340,58 L480,24 L620,56 L760,30 L860,50"
        fill="none" stroke="url(#pulseLine)" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="6 8" opacity="0.7">
    <animate attributeName="stroke-dashoffset" values="0;-140" dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- traveling signal pulse -->
  <circle r="5" fill="url(#coreGlow)">
    <animateMotion dur="4s" repeatCount="indefinite"
      path="M40,50 L190,28 L340,58 L480,24 L620,56 L760,30 L860,50"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- nodes -->
  <g>
    <circle cx="40" cy="50" r="6" fill="#00D1FF">
      <animate attributeName="r" values="5;8;5" dur="2.2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="28" r="6" fill="#00D1FF">
      <animate attributeName="r" values="5;8;5" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="58" r="6" fill="#00D1FF">
      <animate attributeName="r" values="5;8;5" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="24" r="9" fill="#ffffff">
      <animate attributeName="r" values="7;12;7" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="56" r="6" fill="#00D1FF">
      <animate attributeName="r" values="5;8;5" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="30" r="6" fill="#00D1FF">
      <animate attributeName="r" values="5;8;5" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="50" r="6" fill="#00D1FF">
      <animate attributeName="r" values="5;8;5" dur="2.2s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
